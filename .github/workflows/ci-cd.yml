name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw -q test

  backend-build:
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build backend artifact
        run: ./mvnw -q -DskipTests package

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-build:
    needs:
      - backend-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t translation-agency:${{ github.sha }} .

  docker-smoke:
    needs:
      - backend-build
      - frontend-build
      - docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start application stack
        run: docker compose up --build -d

      - name: Wait for local healthcheck
        run: |
          for attempt in {1..30}; do
            if curl -fsSL http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "Local smoke healthcheck passed."
              exit 0
            fi

            echo "Local healthcheck attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "Local smoke healthcheck did not become healthy in time."
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop application stack
        if: always()
        run: docker compose down -v

  deploy:
    needs:
      - docker-smoke
    if: github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK_URL != '' && secrets.RENDER_HEALTHCHECK_URL != ''
    runs-on: ubuntu-latest

    steps:
      - name: Trigger PaaS deployment
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$DEPLOY_HOOK_URL"

      - name: Wait for remote healthcheck
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          for attempt in {1..30}; do
            if curl -fsSL "$HEALTHCHECK_URL" | grep -q '"status":"UP"'; then
              echo "Application is healthy."
              exit 0
            fi

            echo "Healthcheck attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "Healthcheck did not become healthy in time."
          exit 1
